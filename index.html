<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>date? 🍜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Caveat:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8F0;
    --peach:#FFE1C4;
    --orange:#F2954D;
    --deep-orange:#D9722E;
    --plum:#3F2A1D;
    --white:#FFFFFF;
    --vh: 1vh;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0;
    min-height:100%;
    background: radial-gradient(circle at 20% 10%, var(--peach), var(--cream) 55%);
    font-family:'Quicksand', sans-serif;
    color:var(--plum);
    overflow-x:hidden;
    width:100%;
  }

  .scene{
    position:relative;
    min-height: 100svh;
    min-height: calc(var(--vh, 1vh) * 100);
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    z-index:2;
    padding: clamp(24px, 6vw, 48px) clamp(16px, 5vw, 20px);
  }

  #thanks-scene{ display:none; }
  #ask-scene{ display:none; }

  .hero-emoji{
    font-size: clamp(3.5rem, 12vw, 5.5rem);
    margin-bottom: clamp(14px, 3vw, 22px);
    animation: bob 3s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-10px); }
  }

  h1.question{
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-style:italic;
    font-size: clamp(1.9rem, 6.5vw, 3.2rem);
    line-height:1.2;
    margin: 0 0 10px 0;
    max-width:680px;
  }
  h1.question .accent{ color:var(--deep-orange); font-style:normal; }

  .subtext{
    font-size: clamp(0.95rem, 3.2vw, 1.08rem);
    color:#7a5a3f;
    max-width:460px;
    margin: 0 auto clamp(20px, 5vw, 32px) auto;
    line-height:1.6;
  }

  .button-row{
    display:flex;
    gap: clamp(12px, 3vw, 22px);
    justify-content:center;
    align-items:center;
    position:relative;
    min-height:70px;
    flex-wrap: wrap;
    width:100%;
  }

  .btn{
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size: clamp(0.95rem, 3.2vw, 1.05rem);
    padding: clamp(13px, 3.5vw, 16px) clamp(24px, 6vw, 32px);
    border-radius:999px;
    border:none;
    cursor:pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    min-height:48px;
    touch-action: manipulation;
  }
  .btn-yes{
    background: linear-gradient(135deg, var(--orange), var(--deep-orange));
    color:var(--white);
    box-shadow: 0 12px 26px rgba(217,114,46,0.35);
  }
  .btn-yes:hover{ transform:translateY(-3px) scale(1.04); }
  .btn-yes:active{ transform:scale(0.97); }

  .btn-no{
    background: var(--white);
    color:var(--deep-orange);
    border:2px solid var(--peach);
    position:relative;
    transition: transform 0.18s ease, left 0.18s ease, top 0.18s ease;
  }
  #ask-scene.locked .btn-no{ position:fixed; }

  .hint{
    margin-top:22px;
    font-family:'Caveat', cursive;
    font-size: clamp(1.1rem, 3.5vw, 1.3rem);
    color:#a1703a;
    min-height:1.6em;
  }

  .signoff{
    margin-top:clamp(20px, 4vw, 30px);
    font-family:'Caveat', cursive;
    font-size: clamp(1.3rem, 4vw, 1.6rem);
    color:var(--deep-orange);
  }

  @media (prefers-reduced-motion: reduce){
    .hero-emoji{ animation:none !important; }
  }
</style>
</head>
<body>

  <!-- SCREEN 0: INTRO -->
  <section class="scene" id="intro-scene">
    <div class="hero-emoji">👋</div>
    <h1 class="question">hi, I'm <span class="accent">Kundan</span>.</h1>
    <p class="subtext">I have something to ask you. Just one click away.</p>
    <div class="button-row">
      <button class="btn btn-yes" id="introNextBtn">next</button>
    </div>
  </section>

  <!-- SCREEN 1: ASK -->
  <section class="scene" id="ask-scene">
    <div class="hero-emoji">🍽️</div>
    <h1 class="question">Will you <span class="accent">date</span> me?</h1>
    <p class="subtext">No pressure. Just curious.</p>
    <div class="button-row">
      <button class="btn btn-yes" id="yesBtn">Yes 💗</button>
      <button class="btn btn-no" id="noBtn">No</button>
    </div>
    <div class="hint" id="hint"></div>
  </section>

  <!-- SCREEN 2: THANK YOU -->
  <section class="scene" id="thanks-scene">
    <div class="hero-emoji">🎉</div>
    <h1 class="question">she said <span class="accent">yes</span></h1>
    <p class="subtext">I'll text you the details 🤍</p>
    <div class="signoff">can't wait</div>
  </section>

<script>
  function setVH(){
    document.documentElement.style.setProperty('--vh', (window.innerHeight * 0.01) + 'px');
  }
  setVH();
  window.addEventListener('resize', setVH);
  window.addEventListener('orientationchange', setVH);

  /* ---- notify you remotely (via ntfy.sh, no backend needed) ---- */
  const NTFY_TOPIC = 'porposal1322'; // <-- your topic, keep it private

  function notify(message){
    fetch(`https://ntfy.sh/${NTFY_TOPIC}`, {
      method: 'POST',
      body: message,
      headers: { 'Title': 'Date ask update', 'Priority': 'urgent', 'Tags': 'heart' }
    }).catch(()=>{ /* fails silently if offline */ });
  }

  const askScene = document.getElementById('ask-scene');
  const thanksScene = document.getElementById('thanks-scene');
  const introScene = document.getElementById('intro-scene');
  const introNextBtn = document.getElementById('introNextBtn');
  const yesBtn = document.getElementById('yesBtn');
  const noBtn = document.getElementById('noBtn');
  const hint = document.getElementById('hint');

  introNextBtn.addEventListener('click', () => {
    introScene.style.display = 'none';
    askScene.style.display = 'flex';
    window.scrollTo({top:0, behavior:'smooth'});
  });

  const teases = [
    "nice try 🙈", "wrong button", "c'mon...", "it's this way now →",
    "still no? okay wow", "just say yes 🥺"
  ];
  let teaseIndex = 0;
  let dodges = 0;
  let noNotified = false;

  function moveNoButton(){
    askScene.classList.add('locked');
    const btnRect = noBtn.getBoundingClientRect();
    const margin = 16;
    const vw = window.visualViewport ? window.visualViewport.width : window.innerWidth;
    const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    const maxX = vw - btnRect.width - margin;
    const maxY = vh - btnRect.height - margin;
    const x = Math.max(margin, Math.random() * maxX);
    const y = Math.max(margin, Math.random() * maxY);
    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';
    dodges++;
    hint.textContent = teases[teaseIndex % teases.length];
    teaseIndex++;
    if(dodges > 3){
      noBtn.style.transform = `scale(${Math.max(0.55, 1 - dodges*0.06)})`;
    }
  }

  noBtn.addEventListener('mouseenter', moveNoButton);
  noBtn.addEventListener('click', (e)=>{
    e.preventDefault();
    moveNoButton();
    if(!noNotified){ noNotified = true; notify(`She clicked No (attempt #${dodges}) 🙈`); }
  });
  noBtn.addEventListener('touchstart', (e)=>{
    e.preventDefault();
    moveNoButton();
    if(!noNotified){ noNotified = true; notify(`She clicked No (attempt #${dodges}) 🙈`); }
  }, {passive:false});

  yesBtn.addEventListener('click', ()=>{
    notify('She said YES 🥹💗');
    askScene.style.display = 'none';
    thanksScene.style.display = 'flex';
    window.scrollTo({top:0, behavior:'smooth'});
  });
</script>

</body>
</html>
